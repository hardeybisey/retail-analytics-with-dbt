version: 2

snapshots:
  - name: snapshot_sellers
    description: "Seller data from the retail dataset."
    columns:
      - name: seller_id
        data_type: text
        description: "The unique identifier for each seller."
        tests:
          - unique
          - not_null
      - name: zip_code_prefix
        data_type: integer
        description: "first 5 digits of seller zip code."
        tests:
          - relationships:
              to: ref('stg_geolocation')
              field: zip_code_prefix
      - name: valid_from
        data_type: timestamp
        description: "start date of the customer record"
        tests:
          - not_null
      - name: valid_to
        data_type: timestamp
        description: "end date of the customer record, null if the record is current"
      - name: dbt_modified_date
        data_type: timestamp
        description: "last modified date of the customer record"
        tests:
          - not_null

  - name: snapshot_customers
    description: "Customer data from the retail dataset."
    columns:
      - name: customer_id
        data_type: text
        description: "key to the orders dataset. Each order has a unique customer_id."
        tests:
          - not_null
          - unique
      - name: customer_unique_id
        data_type: text
        description: "The unique identifier for each customer."
        tests:
          - not_null
      - name: zip_code_prefix
        data_type: integer
        description: "first five digits of customer zip code."
        tests:
          - relationships:
              to: ref('stg_geolocation')
              field: zip_code_prefix
          - not_null
      - name: valid_from
        data_type: timestamp
        description: "start date of the customer record"
        tests:
          - not_null
      - name: valid_to
        data_type: timestamp
        description: "end date of the customer record, null if the record is current"
      - name: dbt_modified_date
        data_type: timestamp
        description: "last modified date of the customer record"
        tests:
          - not_null
